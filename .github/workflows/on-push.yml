name: テストとバージョン公開

on: push

jobs:
  test-npm:
    name: テスト(npm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - name: 依存ライブラリのインストール
        run: pnpm i
      - name: テスト実行
        run: pnpm test
        env:
          TZ: "Asia/Tokyo"
  # https://code.visualstudio.com/api/working-with-extensions/continuous-integration#github-actions
  test-vscode:
    name: テスト(VSCode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - name: 依存ライブラリのインストール
        run: pnpm i
      - name: テスト実行(Linux)
        run: xvfb-run -a pnpm test-vscode
        if: runner.os == 'Linux'
      - name: テスト実行(Linux以外)
        run: pnpm test-vscode
        if: runner.os != 'Linux'
  release-npm:
    name: バージョン公開(npm)
    runs-on: ubuntu-latest
    # https://github.community/t/github-actions-branch-conditional/16057/3
    if: github.ref == 'refs/heads/main'
    needs: [test-npm]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # https://github.com/changesets/action#with-publishing
          fetch-depth: 0
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - name: 依存ライブラリのインストール
        run: pnpm i
      - name: パッケージのビルド
        run: pnpm build
      - name: リリースPR作成 or npmに公開
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          publish: pnpm -r publish
          version: pnpm new-version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
  release-vscode:
    name: バージョン公開(VSCode)
    runs-on: ubuntu-latest
    # https://github.community/t/github-actions-branch-conditional/16057/3
    if: github.ref == 'refs/heads/main'
    needs: [test-vscode]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # https://github.com/changesets/action#with-publishing
          fetch-depth: 0
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - name: 依存ライブラリのインストール
        run: pnpm i
      - name: パッケージのビルド
        run: pnpm build
      - name: blogview-vscodeのリリース
        run: |
          cd packages/blogview-vscode
          PUBLISHED=$(pnpm vsce search blogview-vscode --json | jq -r '.[].versions[0].version')
          CURRENT=$(cat package.json | jq -r '.version')
          if [ "$PUBLISHED" != "$CURRENT" ]; then
            pnpm release -- -p "$VSCE_TOKEN"
          fi
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
